version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "chore(deps)"
    # Hold back majors that break the build/tests until the toolchain catches up:
    # - typescript 6 errors on `baseUrl` in the tsup DTS build (TS5101)
    # - vitest 4 requires vite >=6; this project is on vite 5
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"

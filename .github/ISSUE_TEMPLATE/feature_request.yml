name: Feature request
description: Suggest an improvement or new capability for repo2post.
title: "[Feature]: "
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: Lead with the problem you're solving — that's what we prioritize on.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain are you hitting? Why does it matter?
      placeholder: "When I write up a release, repo2post can't ___, so I have to ___."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? A new style, flag, or output sketch helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other approaches you've evaluated.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This stays true to repo2post's scope (git change set → grounded release content) and keeps generation injectable/testable.
          required: true
